<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwUuT3PK1sh9z-Pt5pHMNzFmV4euI-n5u-S4zCyu0VaU4tAUUwqwkJCnBOuL6iZsEuQ/exec";
const WHATSAPP_NUMBER = "584242961164";
const ADMIN_PASSWORD = "1234";

let globalData = {};
let cache = {
  sanSelected: null,
  adminSan: null
};

/* ================= INIT ================= */

async function init() {
  try {
    showLoading(true);

    const res = await fetch(API_URL);
    globalData = await res.json();

    populateSelectors();
    renderOfertas();
    switchTab("sanes");

    showLoading(false);
  } catch (e) {
    document.getElementById("loading").innerHTML =
      "⚠️ Error de conexión";
  }
}

function showLoading(state) {
  document.getElementById("loading").classList.toggle("hidden", !state);
}

/* ================= FETCH HELPER ================= */

async function apiPost(payload) {
  return fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
}

/* ================= UI ================= */

function switchTab(tab) {
  ["sanes", "ofertas", "admin"].forEach(t => {
    document.getElementById(`section-${t}`).classList.add("hidden");
  });

  document.getElementById(`section-${tab}`).classList.remove("hidden");

  if (tab === "sanes") renderSanDetails();
  if (tab === "admin") renderAdminPuestos();
}

/* ================= SELECTORS ================= */

function populateSelectors() {
  if (!globalData.sanes?.length) return;

  const options = globalData.sanes.map(s =>
    `<option value="${s.id_san || s.id}">${s.nombre_san || s.nombre}</option>`
  ).join("");

  document.getElementById("san-selector").innerHTML = options;
  document.getElementById("admin-san-selector").innerHTML = options;

  renderSanDetails();
}

/* ================= SAN DETAILS ================= */

function renderSanDetails() {
  const id = document.getElementById("san-selector").value;
  if (!id) return;

  const san = globalData.sanes.find(s => (s.id_san || s.id) === id);
  if (!san) return;

  cache.sanSelected = id;

  const pagos = globalData.pagos.filter(p => (p.id_san || p.id) === id);

  document.getElementById("detail-san-name").innerText = san.nombre_san;
  document.getElementById("detail-san-cuota").innerText =
    "$" + Number(san.cuota || 0).toFixed(2);

  document.getElementById("detail-san-frecuencia").innerText =
    san.frecuencia || "Semanal";

  const grouped = {};

  for (const p of pagos) {
    const r = Number(p.ronda || 1);

    if (!grouped[r]) {
      grouped[r] = {
        ronda: r,
        fecha: p.fecha,
        total: 0,
        pagados: 0,
        clientes: []
      };
    }

    grouped[r].total++;
    grouped[r].clientes.push(p.cliente || "");

    if ((p.estado_pago || "").includes("Pagado"))
      grouped[r].pagados++;
  }

  document.getElementById("client-puestos-container").innerHTML =
    Object.values(grouped)
      .sort((a, b) => a.ronda - b.ronda)
      .map(r => `
        <div class="bg-[#170f2c] p-4 rounded-xl border border-purple-900/40">
          <div class="text-xs font-bold">Ronda ${r.ronda}</div>
          <div class="text-[10px] text-purple-400">${r.pagados}/${r.total}</div>
        </div>
      `).join("");
}

/* ================= OFERTAS ================= */

function renderOfertas() {
  const c = document.getElementById("section-ofertas");

  if (!globalData.ofertas?.length) {
    c.innerHTML = "Sin ofertas";
    return;
  }

  c.innerHTML = globalData.ofertas.map(o => `
    <div class="bg-[#170f2c] p-4 rounded-xl">
      <div class="font-bold">${o.producto}</div>
      <div>$${Number(o.precio_oferta || 0).toFixed(2)}</div>
      <button onclick="order('${o.producto}', ${o.precio_oferta})">
        Pedir
      </button>
    </div>
  `).join("");
}

function order(name, price) {
  const msg = encodeURIComponent(`Producto: ${name} - $${price}`);
  window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`);
}

/* ================= ADMIN ================= */

async function toggleCuota(id, ronda, cliente, estado, btn) {
  const newState = estado.includes("🟢") ? "🔴 Pendiente" : "🟢 Pagado";

  btn.innerText = newState;

  await apiPost({
    action: "updateCuota",
    id_san: id,
    ronda,
    cliente_paga: cliente,
    estado_pago: newState
  });

  const p = globalData.pagos.find(x =>
    (x.id_san || x.id) === id &&
    Number(x.ronda) === ronda &&
    x.cliente === cliente
  );

  if (p) p.estado_pago = newState;
}

init();
</script>
