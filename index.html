<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanes Inversiones Edimar - La Patrona</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0c0817; color: #f3f4f6; overflow-x: hidden; }
        .purple-glow { box-shadow: 0 0 35px rgba(168, 85, 247, 0.2); }
        .pink-glow-soft { box-shadow: 0 0 25px rgba(236, 72, 153, 0.15); }
        .amber-glow-soft { box-shadow: 0 0 25px rgba(245, 158, 11, 0.15); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.4) sepia(1) saturate(3) hue-rotate(270deg); cursor: pointer; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); filter: blur(4px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }
        @keyframes pulseGlow { 0%, 100% { transform: scale(1); opacity: 0.9; box-shadow: 0 0 10px rgba(236, 72, 153, 0.2); } 50% { transform: scale(1.03); opacity: 1; box-shadow: 0 0 25px rgba(236, 72, 153, 0.4); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .animate-fade-in { animation: fadeInUp 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .animate-crown-pulse { animation: pulseGlow 2s infinite ease-in-out; }
        .shimmer-loading { background: linear-gradient(90deg, #170f2c 25%, #28194d 50%, #170f2c 75%); background-size: 200% 100%; animation: shimmer 1.6s infinite linear; }
        .btn-interactive { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-interactive:active { transform: scale(0.94); }
        .tab-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="font-sans antialiased pb-24 selection:bg-pink-500 selection:text-white">

    <header class="bg-gradient-to-b from-[#1f113a] to-[#120826] border-b border-pink-500/20 py-6 px-4 text-center sticky top-0 z-40 shadow-2xl backdrop-blur-md bg-opacity-95">
        <div class="inline-flex items-center justify-center bg-pink-500/10 border border-pink-500/30 px-4 py-1.5 rounded-full mb-2 animate-crown-pulse">
            <i class="fa-solid fa-crown text-amber-400 text-3xl mr-2"></i>
            <span class="text-[10px] uppercase tracking-widest font-black text-pink-400">Inversiones Edimar</span>
        </div>
        <h1 class="text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-pink-400 to-amber-300 uppercase drop-shadow-md">SANES LA PATRONA</h1>
    </header>

    <div class="flex bg-[#120b24] border-b border-purple-900/30 text-center text-xs font-black uppercase tracking-widest sticky top-[97px] z-30 shadow-md">
        <button onclick="switchTab('sanes')" id="tab-sanes" class="w-1/2 py-4 tab-transition border-b-2 border-transparent text-purple-400/50 flex flex-col items-center justify-center gap-1 hover:text-purple-300 btn-interactive">
            <i class="fa-solid fa-vault text-2xl mb-0.5"></i><span>Cronograma</span>
        </button>
        <button onclick="switchTab('ofertas')" id="tab-ofertas" class="w-1/2 py-4 tab-transition border-b-2 border-transparent text-purple-400/50 flex flex-col items-center justify-center gap-1 hover:text-pink-400 btn-interactive">
            <i class="fa-solid fa-tags text-2xl mb-0.5"></i><span>Catálogo Club</span>
        </button>
    </div>

    <main class="max-w-md mx-auto px-4 mt-6">
        <div id="loading" class="text-center py-20 space-y-4">
            <div class="relative inline-block">
                <div class="animate-spin inline-block w-14 h-14 border-[3px] border-purple-500 border-t-transparent rounded-full shadow-lg"></div>
                <i class="fa-solid fa-crown text-pink-500 absolute top-4 left-4 text-xl animate-bounce"></i>
            </div>
            <p class="text-[10px] text-purple-400 font-black tracking-widest uppercase animate-pulse">Sincronizando Servidor...</p>
        </div>

        <section id="section-sanes" class="hidden space-y-5">
            <div class="bg-[#170f2c] p-4 rounded-xl border border-purple-900/30 shadow-xl animate-fade-in purple-glow">
                <label class="block text-[10px] font-black text-purple-400 uppercase tracking-widest mb-2">Seleccione un Grupo Activo:</label>
                <select id="san-selector" onchange="renderSanDetails()" class="w-full bg-[#231742] text-white p-3 rounded-lg border border-purple-800/60 font-bold text-sm focus:outline-none"></select>
            </div>

            <div id="san-info-card" class="bg-gradient-to-br from-[#1c1236] to-[#120b24] p-5 rounded-2xl border border-purple-900/40 purple-glow hidden animate-fade-in">
                <h3 id="detail-san-name" class="text-base font-extrabold text-white">---</h3>
                <div class="grid grid-cols-2 gap-3 mt-4 text-center">
                    <div class="bg-[#0c0817] p-3 rounded-xl border border-purple-950">
                        <span class="block text-[9px] text-purple-400 font-bold uppercase tracking-wider">Cuota Requerida</span>
                        <span id="detail-san-cuota" class="text-lg font-black text-amber-400">$0.00</span>
                    </div>
                    <div class="bg-[#0c0817] p-3 rounded-xl border border-purple-950">
                        <span class="block text-[9px] text-purple-400 font-bold uppercase tracking-wider">Frecuencia</span>
                        <span id="detail-san-frecuencia" class="text-xs font-bold text-gray-200 mt-1 block">---</span>
                    </div>
                </div>
            </div>

            <div id="san-table-container" class="hidden space-y-2.5">
                <div class="space-y-3.5" id="client-puestos-container"></div>
            </div>
        </section>

        <section id="section-ofertas" class="hidden grid grid-cols-1 gap-4"></section>

        <section id="section-admin" class="hidden space-y-6 animate-fade-in">
            <div class="flex justify-between items-center border-b border-purple-900/40 pb-3">
                <h2 class="text-xs font-black text-pink-400 uppercase tracking-widest">Consola Administradora</h2>
                <button onclick="switchTab('sanes')" class="text-[9px] font-black bg-purple-950/60 px-3 py-1.5 rounded-lg text-purple-300 uppercase">Salir</button>
            </div>

            <div class="bg-gradient-to-r from-[#1d123a] to-[#251849] p-4 rounded-xl border border-purple-800/40 shadow-md space-y-3 purple-glow">
                <span class="text-[10px] font-black text-amber-400 uppercase tracking-widest block">Gestión de Datos</span>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="toggleForm('block-add-san')" class="bg-[#120b24] p-2.5 rounded-lg border border-purple-900 text-[10px] font-bold text-purple-300 text-center uppercase btn-interactive">Reg. Nuevo San</button>
                    <button onclick="toggleForm('block-add-oferta')" class="bg-[#120b24] p-2.5 rounded-lg border border-purple-900 text-[10px] font-bold text-purple-300 text-center uppercase btn-interactive">Cargar Oferta</button>
                </div>

                <div id="block-add-san" class="hidden bg-[#0c0817] p-3.5 rounded-xl border border-purple-900 space-y-2.5 mt-2 animate-fade-in">
                    <input type="text" id="new-san-id" placeholder="ID Único (Ej: SAN-BERA)" class="w-full bg-[#17102b] border border-purple-800/60 p-2 rounded text-xs text-white uppercase font-bold focus:outline-none">
                    <input type="text" id="new-san-name" placeholder="Nombre (Ej: Tanda de Motos)" class="w-full bg-[#17102b] border border-purple-800/60 p-2 rounded text-xs text-white focus:outline-none">
                    <div class="grid grid-cols-3 gap-1.5">
                        <input type="number" id="new-san-cuota" placeholder="Cuota $" class="bg-[#17102b] border border-purple-800/60 p-2 rounded text-xs text-white focus:outline-none">
                        <select id="new-san-freq" class="bg-[#17102b] border border-purple-800/60 p-2 rounded text-xs text-white focus:outline-none">
                            <option value="Semanal">Semanal</option>
                            <option value="Quincenal">Quincenal</option>
                            <option value="Mensual">Mensual</option>
                        </select>
                        <input type="number" id="new-san-total" placeholder="Puestos" class="bg-[#17102b] border border-purple-800/60 p-2 rounded text-xs text-white focus:outline-none">
                    </div>
                    <input type="date" id="new-san-date" class="w-full bg-[#17102b] border border-purple-800/60 p-2 rounded text-xs text-white focus:outline-none">
                    <button onclick="submitAddSan()" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 py-2 rounded font-black text-[10px] uppercase text-white btn-interactive">Crear Todo el San</button>
                </div>

                <div id="block-add-oferta" class="hidden bg-[#0c0817] p-3.5 rounded-xl border border-purple-900 space-y-2.5 mt-2">
                    <input type="text" id="new-of-prod" placeholder="Nombre del Artículo" class="w-full bg-[#17102b] border border-purple-800/60 p-2 rounded text-xs text-white focus:outline-none">
                    <div class="grid grid-cols-2 gap-1.5">
                        <input type="number" id="new-of-price" placeholder="Precio $" class="w-full bg-[#17102b] border border-purple-800/60 p-2 rounded text-xs text-white focus:outline-none">
                        <input type="text" id="new-of-disp" placeholder="Disponibilidad" class="w-full bg-[#17102b] border border-purple-800/60 p-2 rounded text-xs text-white focus:outline-none">
                    </div>
                    <input type="text" id="new-of-desc" placeholder="Descripción" class="w-full bg-[#17102b] border border-purple-800/60 p-2 rounded text-xs text-white focus:outline-none">
                    <input type="text" id="new-of-img" placeholder="URL Imagen" class="w-full bg-[#17102b] border border-purple-800/60 p-2 rounded text-xs text-white focus:outline-none">
                    <button onclick="submitAddOferta()" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 py-2 rounded font-black text-[10px] uppercase text-black btn-interactive">Publicar Oferta</button>
                </div>
            </div>

            <div class="bg-[#170f2c] p-4 rounded-xl border border-purple-900/30 space-y-3 amber-glow-soft">
                <label class="block text-[10px] font-black text-purple-400 uppercase tracking-widest">Seleccione Tanda a Gestionar:</label>
                <select id="admin-san-selector" onchange="renderAdminPuestos()" class="w-full bg-[#231742] text-white p-3 rounded-lg border border-purple-800/60 font-bold text-xs focus:outline-none"></select>
                
                <button onclick="saveAllAdminChangesToServer()" class="w-full bg-gradient-to-r from-emerald-500 via-teal-500 to-cyan-500 text-black font-black text-xs py-3 px-4 rounded-xl uppercase tracking-widest shadow-xl flex items-center justify-center gap-2 btn-interactive">
                    <i class="fa-solid fa-floppy-disk text-base"></i> Guardar Cambios en la Nube
                </button>

                <button onclick="deleteCurrentSan()" class="w-full bg-red-950/20 border border-red-700/40 text-red-400 font-black text-[10px] py-2 px-4 rounded-lg uppercase tracking-wider flex items-center justify-center gap-2 btn-interactive">Eliminar Tanda Completa</button>
            </div>

            <div class="space-y-4" id="admin-puestos-container"></div>
        </section>
    </main>

    <button onclick="loginAdmin()" class="fixed bottom-6 right-6 bg-[#211342] text-pink-400 p-5 rounded-full border border-purple-700/60 z-50 purple-glow btn-interactive">
        <i class="fa-solid fa-crown text-3xl"></i>
    </button>

    <script>
        // REEMPLAZA ESTA URL CON TU LINK GENERADO AL IMPLEMENTAR EN GOOGLE SHEETS
        const API_URL = "https://script.google.com/macros/s/AKfycbwUuT3PK1sh9z-Pt5pHMNzFmV4euI-n5u-S4zCyu0VaU4tAUUwqwkJCnBOuL6iZsEuQ/exec";
        const WHATSAPP_NUMBER = "584242961164"; 
        const ADMIN_PASSWORD = "1234"; 
        let globalData = {};
        
        // Memoria volátil temporal
        let stagingChanges = { nombres: {}, cuotas: {}, beneficiarios: {}, entregas: {} };

        async function init() {
            try {
                document.getElementById('loading').classList.remove('hidden');
                const response = await fetch(API_URL);
                globalData = await response.json();
                document.getElementById('loading').classList.add('hidden');
                resetStagingBuffer();
                switchTab('sanes');
                populateSelectors();
                renderOfertas();
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = `<p class="text-red-500 font-bold text-xs uppercase animate-bounce">⚠️ Error de Enlace.</p>`;
            }
        }

        function resetStagingBuffer() {
            stagingChanges = { nombres: {}, cuotas: {}, beneficiarios: {}, entregas: {} };
        }

        function loginAdmin() {
            if (prompt("Contraseña Velvet de Seguridad:") === ADMIN_PASSWORD) { switchTab('admin'); }
        }

        function toggleForm(id) { document.getElementById(id).classList.toggle('hidden'); }

        function switchTab(tab) {
            ['sanes', 'ofertas', 'admin'].forEach(t => {
                if(document.getElementById(`section-${t}`)) document.getElementById(`section-${t}`).classList.add('hidden');
                if(document.getElementById(`tab-${t}`)) document.getElementById(`tab-${t}`).className = "w-1/2 py-4 tab-transition border-b-2 border-transparent text-purple-400/50 flex flex-col items-center justify-center gap-1 hover:text-purple-300 btn-interactive";
            });
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            if(tab === 'sanes') { document.getElementById('tab-sanes').className = "w-1/2 py-4 tab-transition border-b-2 border-purple-500 text-purple-400 font-black flex flex-col items-center justify-center gap-1 scale-[1.02] btn-interactive"; renderSanDetails(); }
            if(tab === 'ofertas') { document.getElementById('tab-ofertas').className = "w-1/2 py-4 tab-transition border-b-2 border-pink-500 text-pink-400 font-black flex flex-col items-center justify-center gap-1 scale-[1.02] btn-interactive"; }
            if(tab === 'admin') renderAdminPuestos();
        }

        function populateSelectors() {
            if(!globalData.sanes || globalData.sanes.length === 0) return;
            const options = globalData.sanes.map(s => `<option value="${s.id_san}">${s.nombre_san}</option>`).join('');
            document.getElementById('san-selector').innerHTML = options;
            document.getElementById('admin-san-selector').innerHTML = options;
            renderSanDetails();
        }

        function renderSanDetails() {
            const id = document.getElementById('san-selector').value;
            if(!id) return;
            const san = globalData.sanes.find(s => s.id_san === id);
            if (!san) return;

            document.getElementById('san-info-card').classList.remove('hidden');
            document.getElementById('san-table-container').classList.remove('hidden');
            document.getElementById('detail-san-name').innerText = san.nombre_san;
            document.getElementById('detail-san-cuota').innerText = `$${parseFloat(san.cuota).toFixed(2)}`;
            document.getElementById('detail-san-frecuencia').innerText = san.frecuencia;

            const todosLosPagos = globalData.pagos.filter(p => p.id_san === id);
            const rMap = {};
            
            todosLosPagos.forEach(p => {
                const r = parseInt(p.ronda || 1); 
                if(!rMap[r]) {
                    rMap[r] = {
                        ronda: r,
                        fecha: p.fecha_pago,
                        beneficiario: p.beneficiario_premio || "",
                        estadoEntrega: p.estado_entrega || "📦 En Almacén",
                        totalClientes: 0,
                        clientesPagados: 0,
                        primerClienteRonda: ""
                    };
                }
                rMap[r].totalClientes++;
                if (!rMap[r].primerClienteRonda) { rMap[r].primerClienteRonda = p.cliente_asignado || ""; }
                if((p.estado_pago || "").includes("🟢") || (p.estado_pago || "").toLowerCase().includes("pagado")) rMap[r].clientesPagados++;
            });

            document.getElementById('client-puestos-container').innerHTML = Object.values(rMap).sort((a,b) => a.ronda - b.ronda).map((r, idx) => {
                let statusText = `📊 Recaudación: ${r.clientesPagados}/${r.totalClientes}`;
                let badgeClass = "bg-purple-500/10 text-purple-300 border-purple-800/40";
                if(r.estadoEntrega.toLowerCase().includes("entregado")) { statusText = "🏆 Entregado"; badgeClass = "bg-pink-500/20 text-pink-400 border-pink-500/30 font-black animate-pulse"; }

                let nombreMostrado = r.beneficiario.trim();
                if (!nombreMostrado || nombreMostrado.toLowerCase().includes("cupo")) { nombreMostrado = r.primerClienteRonda || "Por Asignar"; }

                return `
                    <div class="p-4 rounded-xl bg-[#170f2c] border border-purple-900/30 shadow-md space-y-2 animate-fade-in hover:border-purple-600/50 transition-all" style="animation-delay: ${idx * 0.02}s">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-[9px] font-black text-purple-400 uppercase block">Ronda Nro. ${r.ronda}</span>
                                <h5 class="text-xs font-black text-white mt-0.5">🏆 Premio para: <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-pink-400">${nombreMostrado}</span></h5>
                            </div>
                            <span class="text-[8px] font-black px-2 py-1 rounded border uppercase ${badgeClass}">${statusText}</span>
                        </div>
                        <p class="text-[9px] text-purple-400/60 font-medium">Fecha de Cobro: ${r.fecha ? r.fecha.split("T")[0] : 'Por definir'}</p>
                    </div>`;
            }).join('');
        }

        function renderAdminPuestos() {
            const id = document.getElementById('admin-san-selector').value;
            if(!id) return;
            const todosLosPagos = globalData.pagos.filter(p => p.id_san === id);
            const container = document.getElementById('admin-puestos-container');
            const rMap = {};

            todosLosPagos.forEach(p => {
                const r = parseInt(p.ronda || 1);
                if(!rMap[r]) {
                    rMap[r] = {
                        ronda: r,
                        fecha: p.fecha_pago,
                        beneficiario: p.beneficiario_premio || "",
                        estadoEntrega: p.estado_entrega || "📦 En Almacén",
                        clientesTracker: {},
                        primerClienteRonda: ""
                    };
                }
                if(!rMap[r].primerClienteRonda) { rMap[r].primerClienteRonda = p.cliente_asignado || ""; }
                const cName = p.cliente_asignado || '';
                if(cName && !rMap[r].clientesTracker[cName]) { rMap[r].clientesTracker[cName] = p.estado_pago || "🔴 Pendiente"; }
            });

            container.innerHTML = Object.values(rMap).sort((a,b) => a.ronda - b.ronda).map((r, idx) => {
                const bKey = `${id}_${r.ronda}`;
                const currentBeneficiario = stagingChanges.beneficiarios[bKey] !== undefined ? stagingChanges.beneficiarios[bKey] : r.beneficiario;
                const currentEntrega = stagingChanges.entregas[bKey] !== undefined ? stagingChanges.entregas[bKey] : r.estadoEntrega;
                const isEntregado = currentEntrega.toLowerCase().includes("entregado");
                
                let nombrePremio = currentBeneficiario.trim();
                if (!nombrePremio || nombrePremio.toLowerCase().includes("cupo")) { nombrePremio = r.primerClienteRonda || ""; }

                const listaAsistenciaHtml = Object.keys(r.clientesTracker).map(nombreCliente => {
                    const uniquePagoKey = `${id}_${r.ronda}_${nombreCliente}`;
                    const statusPago = stagingChanges.cuotas[uniquePagoKey] !== undefined ? stagingChanges.cuotas[uniquePagoKey] : r.clientesTracker[nombreCliente];
                    const pagado = statusPago.includes("🟢") || statusPago.toLowerCase().includes("pagado");
                    
                    return `
                        <div class="flex justify-between items-center bg-[#0c0817] p-2 rounded border border-purple-950/60 gap-3">
                            <span class="text-xs font-bold text-white flex-1">${nombreCliente}</span>
                            <button onclick=\"stageCuotaAsistencia('${id}', ${r.ronda}, '${nombreCliente}', '${statusPago}', this)\" class="text-[9px] font-black uppercase px-2.5 py-1.5 rounded border btn-interactive ${pagado ? 'bg-gradient-to-r from-emerald-500 to-teal-500 border-emerald-600 text-black':'bg-red-500/10 border-red-500/30 text-red-400'}">
                                ${pagado ? '🟢 Pagó' : '🔴 Pendiente'}
                            </button>
                        </div>`;
                }).join('');

                return `
                    <div class="bg-gradient-to-b from-[#191031] to-[#110a22] p-4 rounded-xl border ${isEntregado ? 'border-pink-500/40 pink-glow-soft':'border-purple-900/40'} shadow-lg space-y-3">
                        <div class="flex justify-between items-center border-b border-purple-900/30 pb-2">
                            <span class="text-xs font-black text-amber-400">RONDA ADMINISTRATIVA ${r.ronda}</span>
                            <span class="text-[9px] text-purple-300 font-mono bg-purple-950/60 px-2 py-0.5 rounded border border-purple-900/30">${r.fecha ? r.fecha.split("T")[0] : ''}</span>
                        </div>
                        <div class="bg-[#120b24]/80 p-3 rounded-lg border border-purple-950 space-y-2">
                            <div class="flex justify-between items-center">
                                <span class="text-[9px] font-black text-purple-400 uppercase">🏆 Premio para:</span>
                                <input type="text" value="${nombrePremio}" oninput=\"stageBeneficiario('${id}', ${r.ronda}, this.value)\" class="bg-[#0c0817] px-2 py-1 text-right font-black text-xs text-white rounded border border-purple-900/40 w-1/2 focus:outline-none">
                            </div>
                            <div class="flex justify-between items-center pt-1">
                                <span class="text-[9px] font-black text-purple-400 uppercase">Estado:</span>
                                <button onclick=\"stageEstadoEntrega('${id}', ${r.ronda}, '${currentEntrega}', this)\" class="text-[9px] font-black uppercase px-3 py-1.5 rounded border btn-interactive ${isEntregado ? 'bg-gradient-to-r from-pink-500 to-purple-600 border-pink-500 text-white':'bg-purple-950/40 border-purple-800 text-purple-400'}">
                                    ${isEntregado ? '🏆 Entregado' : '📦 En Almacén'}
                                </button>
                            </div>
                        </div>
                        <div class="space-y-1.5">${listaAsistenciaHtml}</div>
                    </div>`;
            }).join('');
        }

        function stageCuotaAsistencia(idSan, ronda, cliente, statusActual, btn) {
            const uniqueKey = `${idSan}_${ronda}_${cliente}`;
            const nuevoEstado = (statusActual.includes("🟢") || statusActual.toLowerCase().includes("pagado")) ? "🔴 Pendiente" : "🟢 Pagado";
            stagingChanges.cuotas[uniqueKey] = nuevoEstado;
            btn.className = nuevoEstado === "🟢 Pagado" ? "text-[9px] font-black uppercase px-2.5 py-1.5 rounded border bg-gradient-to-r from-emerald-500 to-teal-500 border-emerald-600 text-black" : "text-[9px] font-black uppercase px-2.5 py-1.5 rounded border bg-red-500/10 border-red-500/30 text-red-400";
            btn.innerText = nuevoEstado === "🟢 Pagado" ? "🟢 Pagó" : "🔴 Pendiente";
            btn.setAttribute("onclick", `stageCuotaAsistencia('${idSan}', ${ronda}, '${cliente}', '${nuevoEstado}', this)`);
        }

        function stageBeneficiario(idSan, ronda, nuevoNombre) { stagingChanges.beneficiarios[`${idSan}_${ronda}`] = nuevoNombre; }

        function stageEstadoEntrega(idSan, ronda, estadoActual, btn) {
            const bKey = `${idSan}_${ronda}`;
            const nuevoEstado = estadoActual.toLowerCase().includes("entregado") ? "📦 En Almacén" : "🏆 Entregado";
            stagingChanges.entregas[bKey] = nuevoEstado;
            btn.className = nuevoEstado === "🏆 Entregado" ? "text-[9px] font-black uppercase px-3 py-1.5 rounded border bg-gradient-to-r from-pink-500 to-purple-600 border-pink-500 text-white" : "text-[9px] font-black uppercase px-3 py-1.5 rounded border bg-purple-950/40 border-purple-800 text-purple-400";
            btn.innerText = nuevoEstado === "🏆 Entregado" ? "🏆 Entregado" : "📦 En Almacén";
            btn.setAttribute("onclick", `stageEstadoEntrega('${idSan}', ${ronda}, '${nuevoEstado}', this)`);
        }

        // ENVÍO DE DATOS REMOTO (POST SEGURO PARA GOOGLE APPS SCRIPT)
        async function enviarPeticionPost(payload) {
            // Se usa text/plain para evitar que el navegador envíe una solicitud OPTIONS previa (Preflight) que falle en Google
            const respuesta = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            return await respuesta.json();
        }

        async function saveAllAdminChangesToServer() {
            document.getElementById('loading').classList.remove('hidden');
            const payload = { 
                action: "batchAdminUpdate", 
                cuotas: stagingChanges.cuotas, 
                beneficiarios: stagingChanges.beneficiarios, 
                entregas: stagingChanges.entregas 
            };
            try {
                const res = await enviarPeticionPost(payload);
                if(res.status === "success") {
                    alert("🚀 ¡Modificaciones guardadas con éxito en Google Sheets!");
                    setTimeout(() => init(), 500);
                } else {
                    alert("❌ Error interno: " + res.error);
                    document.getElementById('loading').classList.add('hidden');
                }
            } catch(e) {
                console.error(e);
                alert("🚀 Cambios enviados. Sincronizando datos...");
                setTimeout(() => init(), 1200);
            }
        }

        async function submitAddSan() {
            const id = document.getElementById('new-san-id').value.toUpperCase().trim();
            const name = document.getElementById('new-san-name').value.trim();
            const cuota = document.getElementById('new-san-cuota').value;
            const freq = document.getElementById('new-san-freq').value;
            const total = document.getElementById('new-san-total').value;
            const fInicio = document.getElementById('new-san-date').value;

            if(!id || !name || !cuota || !fInicio || !total) return alert("Por favor complete todos los campos.");
            document.getElementById('loading').classList.remove('hidden');

            const payload = { 
                action: "addSan", 
                id_san: id, 
                nombre_san: name, 
                cuota: parseFloat(cuota), 
                frecuencia: freq, 
                total_puestos: parseInt(total), 
                fecha_inicio: fInicio 
            };
            
            try {
                await enviarPeticionPost(payload);
                alert("🎉 ¡Nuevo San creado con sus rondas inicializadas con éxito!");
                document.getElementById('new-san-id').value = "";
                document.getElementById('new-san-name').value = "";
                document.getElementById('new-san-cuota').value = "";
                document.getElementById('new-san-total').value = "";
                document.getElementById('new-san-date').value = "";
                toggleForm('block-add-san');
                setTimeout(() => init(), 1000);
            } catch (error) {
                console.error(error);
                setTimeout(() => init(), 1500);
            }
        }

        async function deleteCurrentSan() {
            const id = document.getElementById('admin-san-selector').value;
            if(!id || !confirm("¿Está seguro de eliminar por completo esta tanda y todos sus registros de pago asociados?")) return;
            document.getElementById('loading').classList.remove('hidden');
            try {
                await enviarPeticionPost({ action: "deleteSan", id_san: id });
                alert("🗑️ Tanda eliminada.");
                setTimeout(() => init(), 1000);
            } catch(e) {
                setTimeout(() => init(), 1200);
            }
        }

        async function submitAddOferta() {
            const prod = document.getElementById('new-of-prod').value.trim();
            const price = document.getElementById('new-of-price').value;
            const disp = document.getElementById('new-of-disp').value.trim();
            const desc = document.getElementById('new-of-desc').value.trim();
            const img = document.getElementById('new-of-img').value.trim();
            if(!prod || !price) return alert("El nombre y precio son obligatorios.");
            document.getElementById('loading').classList.remove('hidden');
            try {
                await enviarPeticionPost({ 
                    action: "addOferta", 
                    producto: prod, 
                    precio_oferta: price, 
                    descripcion: desc, 
                    disponibilidad: disp, 
                    imgUrl: img 
                });
                alert("🎁 ¡Nueva oferta añadida al catálogo!");
                document.getElementById('new-of-prod').value = "";
                document.getElementById('new-of-price').value = "";
                document.getElementById('new-of-disp').value = "";
                document.getElementById('new-of-desc').value = "";
                document.getElementById('new-of-img').value = "";
                toggleForm('block-add-oferta');
                setTimeout(() => init(), 1000);
            } catch(e) {
                setTimeout(() => init(), 1200);
            }
        }

        function renderOfertas() {
            const container = document.getElementById('section-ofertas');
            if (!globalData.ofertas || globalData.ofertas.length === 0) { container.innerHTML = `<p class="text-xs text-center py-12 text-purple-400">Sin promociones cargadas en el catálogo.</p>`; return; }
            container.innerHTML = globalData.ofertas.map(o => {
                const img = o.imgurl || 'https://images.unsplash.com/photo-1601524909162-be87252be298?auto=format&fit=crop&w=300&q=80';
                return `
                    <div class="bg-[#170f2c] rounded-2xl border border-purple-900/30 overflow-hidden flex flex-col justify-between shadow-lg">
                        <div class="p-4 flex space-x-4">
                            <img src="${img}" class="w-16 h-16 object-cover rounded-xl bg-purple-950 border border-purple-900/40">
                            <div class="flex-1 min-w-0">
                                <span class="text-[8px] font-black text-amber-400 block mb-0.5">${o.disponibilidad || 'Disponible'}</span>
                                <h4 class="text-xs font-black text-white truncate uppercase">${o.producto}</h4>
                                <p class="text-[11px] text-purple-300/70 line-clamp-2 mt-0.5">${o.descripcion || ''}</p>
                            </div>
                        </div>
                        <div class="bg-[#120b24]/60 px-4 py-3 border-t border-purple-900/20 flex items-center justify-between">
                            <span class="text-base font-black text-white">$${parseFloat(o.precio_oferta || 0).toFixed(2)}</span>
                            <button onclick=\"orderViaWhatsApp('${o.producto}', '${o.precio_oferta}')\" class="bg-gradient-to-r from-purple-600 to-pink-600 text-white font-black text-[10px] py-2 px-4 rounded-lg uppercase">Pedir</button>
                        </div>
                    </div>`;
            }).join('');
        }

        function orderViaWhatsApp(name, price) {
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent("¡Hola! Me interesa el siguiente producto de los Sanes:\n📦 *Producto:* " + name + "\n💰 *Precio:* $" + parseFloat(price).toFixed(2))}`, '_blank');
        }

        init();
    </script>
</body>
</html>
