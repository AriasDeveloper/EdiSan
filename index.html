<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SANES LA PATRONA</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="bg-[#0b0618] text-white min-h-screen">

    <!-- LOADING -->

    <div id="loading"
         class="fixed inset-0 bg-black/80 flex items-center justify-center z-50">

        <div class="text-center">

            <div
                class="animate-spin rounded-full h-16 w-16 border-b-2 border-purple-500 mx-auto mb-4">
            </div>

            <p>Cargando información...</p>

        </div>

    </div>

    <!-- HEADER -->

    <header
        class="sticky top-0 z-40 bg-[#12091f] border-b border-purple-900/30">

        <div
            class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">

            <h1 class="font-bold text-xl">

                SANES LA PATRONA

            </h1>

            <button
                id="btn-admin"
                class="bg-purple-700 hover:bg-purple-600 px-4 py-2 rounded-xl">

                <i class="fa-solid fa-lock"></i>

                Admin

            </button>

        </div>

    </header>

    <!-- NAV -->

    <nav
        class="bg-[#12091f] border-b border-purple-900/30">

        <div
            class="max-w-7xl mx-auto px-4 py-3 flex gap-2 flex-wrap">

            <button
                data-tab="sanes"
                class="tab-btn px-4 py-2 rounded-xl bg-purple-700">

                SANES

            </button>

            <button
                data-tab="ofertas"
                class="tab-btn px-4 py-2 rounded-xl bg-[#1a1030]">

                Ofertas

            </button>

            <button
                data-tab="admin"
                class="tab-btn px-4 py-2 rounded-xl bg-[#1a1030] hidden">

                Administración

            </button>

        </div>

    </nav>

    <!-- MAIN -->

    <main
        class="max-w-7xl mx-auto p-4">

        <!-- SANES -->

        <section id="section-sanes">

            <div
                class="bg-[#170f2c] p-4 rounded-2xl mb-4">

                <label class="block mb-2">

                    Seleccionar SAN

                </label>

                <select
                    id="san-selector"
                    class="w-full bg-[#0f081f] rounded-xl p-3">
                </select>

            </div>

            <div
                id="san-details">
            </div>

            <div
                id="client-puestos-container"
                class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-4">
            </div>

        </section>

        <!-- OFERTAS -->

        <section
            id="section-ofertas"
            class="hidden">

            <div
                id="ofertas-container"
                class="grid md:grid-cols-3 gap-4">
            </div>

        </section>

        <!-- ADMIN -->

        <section id="section-admin" class="hidden">

            <!-- CREAR SAN -->

            <div class="bg-[#170f2c] p-5 rounded-2xl mb-5">

                <h2 class="text-xl font-bold mb-4">
                    Crear SAN
                </h2>

                <form id="form-add-san" class="grid md:grid-cols-2 gap-3">

                    <input
                        name="id_san"
                        placeholder="ID SAN"
                        required
                        class="bg-[#0f081f] p-3 rounded-xl">

                    <input
                        name="nombre_san"
                        placeholder="Nombre SAN"
                        required
                        class="bg-[#0f081f] p-3 rounded-xl">

                    <input
                        name="cuota"
                        type="number"
                        placeholder="Cuota"
                        required
                        class="bg-[#0f081f] p-3 rounded-xl">

                    <select
                        name="frecuencia"
                        class="bg-[#0f081f] p-3 rounded-xl">

                        <option>Semanal</option>
                        <option>Quincenal</option>
                        <option>Mensual</option>

                    </select>

                    <input
                        name="total_puestos"
                        type="number"
                        placeholder="Puestos"
                        required
                        class="bg-[#0f081f] p-3 rounded-xl">

                    <input
                        name="fecha_inicio"
                        type="date"
                        required
                        class="bg-[#0f081f] p-3 rounded-xl">

                    <button
                        type="submit"
                        class="bg-green-600 rounded-xl py-3">

                        Crear SAN

                    </button>

                </form>

            </div>

            <!-- CREAR OFERTA -->

            <div class="bg-[#170f2c] p-5 rounded-2xl mb-5">

                <h2 class="text-xl font-bold mb-4">

                    Crear Oferta

                </h2>

                <form id="form-add-oferta"
                    class="grid md:grid-cols-2 gap-3">

                    <input
                        name="producto"
                        placeholder="Producto"
                        required
                        class="bg-[#0f081f] p-3 rounded-xl">

                    <input
                        name="precio_oferta"
                        type="number"
                        placeholder="Precio"
                        required
                        class="bg-[#0f081f] p-3 rounded-xl">

                    <input
                        name="descripcion"
                        placeholder="Descripción"
                        class="bg-[#0f081f] p-3 rounded-xl">

                    <input
                        name="disponibilidad"
                        placeholder="Disponibilidad"
                        class="bg-[#0f081f] p-3 rounded-xl">

                    <input
                        name="imgUrl"
                        placeholder="URL Imagen"
                        class="bg-[#0f081f] p-3 rounded-xl">

                    <button
                        type="submit"
                        class="bg-blue-600 rounded-xl py-3">

                        Crear Oferta

                    </button>

                </form>

            </div>

            <!-- GESTIÓN SAN -->

            <div class="bg-[#170f2c] p-5 rounded-2xl">

                <h2 class="text-xl font-bold mb-4">

                    Gestión SAN

                </h2>

                <select
                    id="admin-san-selector"
                    class="w-full bg-[#0f081f] rounded-xl p-3 mb-4">
                </select>

                <div id="admin-container"></div>

            </div>

        </section>

    </main>

    <!-- TOAST -->

    <div
        id="toast"
        class="hidden fixed bottom-6 right-6 bg-green-600 px-4 py-3 rounded-xl shadow-xl">
    </div>

    <!-- JS -->

    <script type="module" src="./js/app.js"></script>

</body>

</html>
