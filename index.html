<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Sanes y Ofertas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; }
        .gold-glow { box-shadow: 0 0 15px rgba(234, 179, 8, 0.15); }
        .tab-active { border-bottom: 3px solid #eab308; color: #eab308; }
    </style>
</head>
<body class="font-sans antialiased pb-24">

    <header class="bg-[#111827] border-b border-gray-800 py-6 px-4 text-center sticky top-0 z-40 shadow-md">
        <h1 class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-amber-500">
            ✨ PORTAL DE SANES & OFERTAS ✨
        </h1>
        <p class="text-xs text-gray-400 mt-1">Consulta tus estados de cuenta y promociones 24/7</p>
    </header>

    <div class="flex bg-[#111827] border-b border-gray-800 text-center text-sm font-bold tracking-wide">
        <button onclick="switchTab('sanes')" id="tab-sanes" class="w-1/2 py-4 tab-active transition-all duration-300">
            <i class="fa-solid fa-piggy-bank mr-2"></i>Sanes / Tandas
        </button>
        <button onclick="switchTab('ofertas')" id="tab-ofertas" class="w-1/2 py-4 text-gray-400 transition-all duration-300">
            <i class="fa-solid fa-fire mr-2 text-amber-500"></i>Ofertas
        </button>
    </div>

    <main class="max-w-md mx-auto px-4 mt-6">
        
        <div id="loading" class="text-center py-20">
            <div class="animate-spin inline-block w-10 h-10 border-[4px] border-current border-t-transparent text-yellow-500 rounded-full"></div>
            <p class="text-sm text-gray-400 mt-3 tracking-widest">Sincronizando portal...</p>
        </div>

        <section id="section-sanes" class="hidden space-y-6">
            <div class="bg-[#111827] p-4 rounded-xl border border-gray-800">
                <label class="block text-xs font-bold text-yellow-500 uppercase tracking-wider mb-2">Selecciona un San activo:</label>
                <select id="san-selector" onchange="renderSanDetails()" class="w-full bg-[#1f2937] text-white p-3 rounded-lg border border-gray-700 focus:outline-none focus:border-yellow-500 font-medium">
                </select>
            </div>

            <div id="san-info-card" class="bg-gradient-to-br from-[#111827] to-[#1f2937] p-5 rounded-2xl border border-gray-800 gold-glow hidden">
                <h3 id="detail-san-name" class="text-lg font-extrabold text-white">---</h3>
                <div class="grid grid-cols-2 gap-4 mt-4 text-center">
                    <div class="bg-[#0b0f19] p-3 rounded-xl border border-gray-800">
                        <span class="block text-[10px] text-gray-400 font-bold uppercase">Cuota</span>
                        <span id="detail-san-cuota" class="text-xl font-black text-yellow-400">$0.00</span>
                    </div>
                    <div class="bg-[#0b0f19] p-3 rounded-xl border border-gray-800">
                        <span class="block text-[10px] text-gray-400 font-bold uppercase">Frecuencia</span>
                        <span id="detail-san-frecuencia" class="text-sm font-bold text-gray-200 mt-1 block">---</span>
                    </div>
                </div>
                <div class="mt-4 flex justify-between items-center text-xs text-gray-400 px-1">
                    <span>Puestos totales: <strong id="detail-san-puestos" class="text-white">0</strong></span>
                    <span id="detail-san-estado" class="px-2 py-1 rounded bg-yellow-500/10 text-yellow-400 font-bold">---</span>
                </div>
            </div>

            <div id="san-table-container" class="hidden">
                <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 px-1">Cronograma de puestos</h4>
                <div class="space-y-3" id="table-body-puestos"></div>
            </div>
        </section>

        <section id="section-ofertas" class="hidden space-y-4">
            <div id="ofertas-container" class="grid grid-cols-1 gap-4"></div>
        </section>

        <section id="section-admin" class="hidden space-y-6 bg-[#111827] p-5 rounded-2xl border border-gray-800 gold-glow">
            <div class="flex justify-between items-center border-b border-gray-800 pb-3">
                <h2 class="text-lg font-black text-yellow-500"><i class="fa-solid fa-screwdriver-wrench mr-2"></i>Panel de Control</h2>
                <button onclick="switchTab('sanes')" class="text-xs bg-gray-800 px-3 py-1.5 rounded-lg text-gray-400 hover:text-white">Salir</button>
            </div>

            <form id="form-oferta" onsubmit="submitAdminForm(event, 'addOferta')" class="space-y-3 bg-[#1f2937]/40 p-4 rounded-xl border border-gray-800">
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-wider mb-2">🎁 Publicar Nueva Oferta</h3>
                <input type="text" placeholder="Nombre del Producto (Ej: Cargador HP)" required id="of-producto" class="w-full bg-[#111827] p-2.5 rounded-lg text-sm border border-gray-700 text-white">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" step="0.01" placeholder="Precio ($)" required id="of-precio" class="w-full bg-[#111827] p-2.5 rounded-lg text-sm border border-gray-700 text-white">
                    <input type="text" placeholder="Disponibilidad (Ej: Disponible)" required id="of-disp" class="w-full bg-[#111827] p-2.5 rounded-lg text-sm border border-gray-700 text-white">
                </div>
                <input type="text" placeholder="Descripción corta" id="of-desc" class="w-full bg-[#111827] p-2.5 rounded-lg text-sm border border-gray-700 text-white">
                <input type="text" placeholder="URL de la imagen (Opcional)" id="of-img" class="w-full bg-[#111827] p-2.5 rounded-lg text-sm border border-gray-700 text-white">
                <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-extrabold text-xs py-2.5 rounded-lg tracking-wider uppercase transition-all">Subir Oferta</button>
            </form>

            <form id="form-san" onsubmit="submitAdminForm(event, 'addSan')" class="space-y-3 bg-[#1f2937]/40 p-4 rounded-xl border border-gray-800">
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-wider mb-2">🐷 Crear Nuevo Grupo de San</h3>
                <input type="text" placeholder="Código Único (Ej: SAN-IPHONE)" required id="san-id" class="w-full bg-[#111827] p-2.5 rounded-lg text-sm border border-gray-700 text-white">
                <input type="text" placeholder="Nombre Completo del San" required id="san-name" class="w-full bg-[#111827] p-2.5 rounded-lg text-sm border border-gray-700 text-white">
                <div class="grid grid-cols-3 gap-2">
                    <input type="number" step="0.01" placeholder="Cuota $" required id="san-cuota" class="w-full bg-[#111827] p-2.5 rounded-lg text-sm border border-gray-700 text-white">
                    <input type="text" placeholder="Frecuencia" required id="san-freq" class="w-full bg-[#111827] p-2.5 rounded-lg text-sm border border-gray-700 text-white">
                    <input type="number" placeholder="Puestos" required id="san-total" class="w-full bg-[#111827] p-2.5 rounded-lg text-sm border border-gray-700 text-white">
                </div>
                <button type="submit" class="w-full bg-amber-500 hover:bg-amber-400 text-black font-extrabold text-xs py-2.5 rounded-lg tracking-wider uppercase transition-all">Crear San</button>
            </form>

            <form id="form-pago" onsubmit="submitAdminForm(event, 'addPago')" class="space-y-3 bg-[#1f2937]/40 p-4 rounded-xl border border-gray-800">
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-wider mb-2">📋 Asignar Puesto o Pago</h3>
                <input type="text" placeholder="Código del San (Debe coincidir, Ej: SAN-IPHONE)" required id="pag-id" class="w-full bg-[#111827] p-2.5 rounded-lg text-sm border border-gray-700 text-white">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" placeholder="Número de Puesto" required id="pag-puesto" class="w-full bg-[#111827] p-2.5 rounded-lg text-sm border border-gray-700 text-white">
                    <input type="date" required id="pag-fecha" class="w-full bg-[#111827] p-2.5 rounded-lg text-sm border border-gray-700 text-white">
                </div>
                <input type="text" placeholder="Nombre del Cliente (O 'Disponible')" required id="pag-cliente" class="w-full bg-[#111827] p-2.5 rounded-lg text-sm border border-gray-700 text-white">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" step="0.01" placeholder="Monto de Cuota $" required id="pag-monto" class="w-full bg-[#111827] p-2.5 rounded-lg text-sm border border-gray-700 text-white">
                    <select id="pag-estado" class="w-full bg-[#111827] p-2.5 rounded-lg text-sm border border-gray-700 text-white">
                        <option value="🟢 Pagado">🟢 Pagado</option>
                        <option value="🟡 Pendiente">🟡 Pendiente</option>
                        <option value="🟢 Pagado - Entregado">🟢 Pagado - Entregado</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-extrabold text-xs py-2.5 rounded-lg tracking-wider uppercase transition-all">Guardar Puesto</button>
            </form>
        </section>

    </main>

    <button onclick="loginAdmin()" class="fixed bottom-6 right-6 bg-[#1f2937] hover:bg-gray-700 text-yellow-500 p-4 rounded-full shadow-2xl border border-gray-700 transition-all z-50">
        <i class="fa-solid fa-lock text-lg"></i>
    </button>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwUuT3PK1sh9z-Pt5pHMNzFmV4euI-n5u-S4zCyu0VaU4tAUUwqwkJCnBOuL6iZsEuQ/exec";
        const WHATSAPP_NUMBER = "584242961164"; 
        const ADMIN_PASSWORD = "1234"; // Esta es la clave del panel de la dueña
        let globalData = {};

        async function init() {
            try {
                document.getElementById('loading').classList.remove('hidden');
                const response = await fetch(API_URL);
                globalData = await response.json();
                document.getElementById('loading').classList.add('hidden');
                switchTab('sanes');
                populateSanSelector();
                renderOfertas();
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = `<p class="text-red-500 font-bold text-sm">Error de sincronización.</p>`;
            }
        }

        function loginAdmin() {
            const pass = prompt("Introduce la clave de administradora:");
            if (pass === ADMIN_PASSWORD) {
                switchTab('admin');
            } else if (pass !== null) {
                alert("Clave incorrecta");
            }
        }

        function switchTab(tab) {
            const tabs = ['sanes', 'ofertas', 'admin'];
            tabs.forEach(t => {
                const element = document.getElementById(`section-${t}`);
                if(element) element.classList.add('hidden');
                const btn = document.getElementById(`tab-${t}`);
                if(btn) btn.classList.remove('tab-active', 'text-gray-400');
            });

            document.getElementById(`section-${tab}`).classList.remove('hidden');
            if(tab !== 'admin') document.getElementById(`tab-${tab}`).classList.add('tab-active');
        }

        function populateSanSelector() {
            const selector = document.getElementById('san-selector');
            if (!globalData.sanes || globalData.sanes.length === 0) {
                selector.innerHTML = `<option>No hay Sanes registrados</option>`;
                return;
            }
            selector.innerHTML = globalData.sanes.map((san, idx) => `<option value="${san.id_san}">${san.nombre_san}</option>`).join('');
            renderSanDetails();
        }

        function renderSanDetails() {
            const selectedId = document.getElementById('san-selector').value;
            const san = globalData.sanes.find(s => s.id_san === selectedId);
            if (!san) return;

            document.getElementById('san-info-card').classList.remove('hidden');
            document.getElementById('san-table-container').classList.remove('hidden');
            document.getElementById('detail-san-name').innerText = san.nombre_san;
            document.getElementById('detail-san-cuota').innerText = `$${parseFloat(san.cuota).toFixed(2)}`;
            document.getElementById('detail-san-frecuencia').innerText = san.frecuencia;
            document.getElementById('detail-san-puestos').innerText = san.total_puestos;
            document.getElementById('detail-san-estado').innerText = san.estado;

            const puestos = globalData.pagos.filter(p => p.id_san === selectedId);
            const container = document.getElementById('table-body-puestos');

            if(puestos.length === 0) {
                container.innerHTML = `<p class="text-xs text-gray-500 text-center py-4">Sin puestos asignados todavía.</p>`;
                return;
            }

            container.innerHTML = puestos.map(p => {
                let statusClass = "bg-gray-800 text-gray-400 border-gray-700";
                if (p.estado_pago.includes("🟢")) statusClass = "bg-green-500/10 text-green-400 border-green-500/20";
                if (p.estado_pago.includes("🟡")) statusClass = "bg-yellow-500/10 text-yellow-400 border-yellow-500/20";
                return `
                    <div class="flex items-center justify-between p-3 rounded-xl bg-[#111827] border border-gray-800">
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 rounded-full bg-yellow-500/10 flex items-center justify-center font-black text-yellow-500 text-sm">${p.numero_puesto}</div>
                            <div>
                                <h5 class="text-sm font-bold ${p.cliente_assigned && p.cliente_assigned.toLowerCase().includes('disponible') ? 'text-gray-500' : 'text-white'}">${p.cliente_asignado || p.cliente_assigned}</h5>
                                <p class="text-[10px] text-gray-400">Límite: ${p.fecha_pago.split("T")[0]}</p>
                            </div>
                        </div>
                        <span class="text-[11px] font-bold px-2 py-1 rounded border ${statusClass}">${p.estado_pago}</span>
                    </div>`;
            }).join('');
        }

        function renderOfertas() {
            const container = document.getElementById('ofertas-container');
            if (!globalData.ofertas || globalData.ofertas.length === 0) {
                container.innerHTML = `<p class="text-xs text-gray-500 text-center py-12">No hay ofertas publicadas.</p>`;
                return;
            }
            container.innerHTML = globalData.ofertas.map(o => {
                const img = o.imgUrl ? o.imgUrl : 'https://images.unsplash.com/photo-1601524909162-be87252be298?auto=format&fit=crop&w=300&q=80';
                return `
                    <div class="bg-[#111827] rounded-2xl border border-gray-800 overflow-hidden flex flex-col justify-between">
                        <div class="p-4 flex space-x-4">
                            <img src="${img}" class="w-20 h-20 object-cover rounded-xl bg-gray-800">
                            <div class="flex-1 min-w-0">
                                <span class="text-[9px] font-black text-yellow-500 uppercase">${o.disponibilidad}</span>
                                <h4 class="text-sm font-extrabold text-white truncate">${o.producto}</h4>
                                <p class="text-xs text-gray-400 line-clamp-2 mt-1">${o.descripcion}</p>
                            </div>
                        </div>
                        <div class="bg-[#1f2937]/50 px-4 py-3 border-t border-gray-800 flex items-center justify-between">
                            <span class="text-lg font-black text-white">$${parseFloat(o.precio_oferta).toFixed(2)}</span>
                            <button onclick="orderViaWhatsApp('${o.id || 'OFE'}', '${o.producto}', '${o.precio_oferta}')" class="bg-emerald-600 text-white font-bold text-xs py-2 px-3 rounded-lg flex items-center">
                                <i class="fa-brands fa-whatsapp text-sm mr-1.5"></i>Pedir Oferta
                            </button>
                        </div>
                    </div>`;
            }).join('');
        }

        function orderViaWhatsApp(id, name, price) {
            const message = encodeURIComponent(`¡Hola! Me interesa la oferta:\n\n📦 *Producto:* ${name}\n💰 *Precio:* $${parseFloat(price).toFixed(2)}`);
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${message}`, '_blank');
        }

        async function submitAdminForm(event, action) {
            event.preventDefault();
            const btn = event.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = "GUARDANDO...";
            btn.disabled = true;

            let payload = { action: action };

            if (action === 'addOferta') {
                payload.id = "OFE-" + Date.now().toString().slice(-4);
                payload.producto = document.getElementById('of-producto').value;
                payload.precio_oferta = document.getElementById('of-precio').value;
                payload.descripcion = document.getElementById('of-desc').value;
                payload.disponibilidad = document.getElementById('of-disp').value;
                payload.imgUrl = document.getElementById('of-img').value;
            } else if (action === 'addSan') {
                payload.id_san = document.getElementById('san-id').value.toUpperCase().trim();
                payload.nombre_san = document.getElementById('san-name').value;
                payload.cuota = document.getElementById('san-cuota').value;
                payload.frecuencia = document.getElementById('san-freq').value;
                payload.total_puestos = document.getElementById('san-total').value;
                payload.estado = "Activo";
            } else if (action === 'addPago') {
                payload.id_san = document.getElementById('pag-id').value.toUpperCase().trim();
                payload.numero_puesto = document.getElementById('pag-puesto').value;
                payload.fecha_pago = document.getElementById('pag-fecha').value;
                payload.cliente_asignado = document.getElementById('pag-cliente').value;
                payload.monto_cuota = document.getElementById('pag-monto').value;
                payload.estado_pago = document.getElementById('pag-estado').value;
            }

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    mode: "no-cors", // Requerido para Apps Script sin servidores intermedios
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                
                alert("¡Datos guardados con éxito en la base de datos!");
                event.target.reset();
                init(); // Recargar datos
            } catch (error) {
                console.error(error);
                alert("Error al guardar los datos.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        init();
    </script>
</body>
</html>
