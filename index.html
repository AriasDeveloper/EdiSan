<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <script>
        // PEGA AQUÍ TU URL DE EJECUCIÓN (La que termina en /exec)
        const API_URL = "https://script.google.com/macros/s/AKfycbwUuT3PK1sh9z-Pt5pHMNzFmV4euI-n5u-S4zCyu0VaU4tAUUwqwkJCnBOuL6iZsEuQ/exec"; 

        async function cargarDatos() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Muestra algo en pantalla para saber que cargó
                document.getElementById("status").innerText = "¡Datos cargados correctamente!";
                console.log(data); // Mira los datos en la consola (F12)
            } catch (e) {
                document.getElementById("status").innerText = "Error: " + e.message;
            }
        }
    </script>
</head>
<body onload="cargarDatos()">
    <h1>Estado de la conexión:</h1>
    <p id="status">Cargando...</p>
</body>
</html>
