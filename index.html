<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaseEdimar - Vitrina Premium</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts para tipografía moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- PANTALLA DE CARGA (LOADER) -->
    <div id="loader" class="loader-container">
        <div class="spinner"></div>
        <p>Sincronizando con BaseEdimar...</p>
    </div>

    <!-- BARRA DE NAVEGACIÓN -->
    <header class="navbar">
        <div class="logo">Base<span>Edimar</span></div>
        <nav>
            <button id="btn-admin-access" class="btn-nav-admin" onclick="abrirPanelAdmin()">
                <span class="icon">🔒</span> Panel Admin
            </button>
        </nav>
    </header>

    <!-- CONTENIDO PRINCIPAL / VITRINA -->
    <main class="contenedor-principal">
        <section class="seccion-vitrina">
            <h1 class="titulo-principal">Ciclos Activos y Productos</h1>
            <p class="subtitulo">Gestión automatizada de Sanes y Catálogo Comercial</p>
            
            <!-- Contenedor dinámico donde app.js inyectará las tarjetas -->
            <div id="contenedor-grid" class="grid-premium">
                <!-- Se rellena dinámicamente -->
            </div>
        </section>
    </main>

    <!-- PANEL DE ADMINISTRACIÓN SUPER PREMIUM (OCULTO POR DEFECTO) -->
    <div id="panel-admin-abierto" class="panel-glass" style="display: none;">
        <div class="panel-content">
            <div class="panel-header">
                <h2>Acceso Restringido</h2>
                <p class="saludo-patrona">Bienvenida, La Patrona Edimar</p>
            </div>
            
            <div class="form-grupo">
                <label for="admin-password">Clave Maestra de Seguridad</label>
                <input type="password" id="admin-password" placeholder="••••••••" class="input-premium">
            </div>
            
            <div class="panel-acciones">
                <button onclick="verificarAccesoAdmin()" class="btn-neon">Iniciar Sesión</button>
                <button onclick="cerrarPanelAdmin()" class="btn-secundario">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- ENLACE AL SCRIPT DE COMPORTAMIENTO (SIN ETIQUETAS INTERNAS ROTHAS) -->
    <script src="app.js"></script>
</body>
</html>
